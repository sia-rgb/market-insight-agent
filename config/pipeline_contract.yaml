version: 2

pipeline_contract:
  input:
    - market-data-auto.xlsx

  intermediate_outputs:
    - standardized_market_data

  dashboard_input:
    - standardized_market_data

  outputs:
    - dashboard_data
    - frontend_static_dashboard

  artifact_filenames:
    standardized_market_data: standardized_market_data.csv
    dashboard_data: dashboard_data.json

  steps:
    - step_name: ingest_standardize
      input:
        - market-data-auto.xlsx
      output:
        - standardized_market_data

    - step_name: build_dashboard_data
      input:
        - standardized_market_data
      output:
        - dashboard_data

  layer_boundaries:
    data_analytics:
      - ingest_standardize
    dashboard_data:
      - build_dashboard_data
    agent_legacy_disabled:
      - build_weekly_metrics
      - build_weekly_changes
      - detect_anomalies
      - generate_insights
      - render_report

  hard_constraints:
    - Default run_all must not execute generate_insights or external search.
    - Dashboard rendering must consume dashboard_data.json and must not add inferred drivers.
    - Data values from standardized_market_data must not be rewritten by dashboard rendering.
