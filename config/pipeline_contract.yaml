version: 1

pipeline_contract:
  input:
    - market-data-auto.xlsx

  intermediate_outputs:
    - standardized_market_data
    - weekly_metrics
    - weekly_changes
    - anomaly_candidates

  reporting_input:
    - report_insights

  outputs:
    - report_insights
    - weekly_report.docx

  artifact_filenames:
    standardized_market_data: standardized_market_data.csv
    weekly_metrics: weekly_metrics.csv
    weekly_changes: weekly_changes.csv
    anomaly_candidates: anomaly_candidates.csv
    report_insights: report_insights.json
    weekly_report: weekly_report.docx

  steps:
    - step_name: ingest_standardize
      input:
        - market-data-auto.xlsx
      output:
        - standardized_market_data

    - step_name: build_weekly_metrics
      input:
        - standardized_market_data
      output:
        - weekly_metrics

    - step_name: build_weekly_changes
      input:
        - weekly_metrics
      output:
        - weekly_changes

    - step_name: detect_anomalies
      input:
        - weekly_changes
      output:
        - anomaly_candidates

    - step_name: generate_insights
      input:
        - anomaly_candidates
        - weekly_changes
      output:
        - report_insights
      runtime_defaults:
        target_week_start: latest_completed_natural_week_if_omitted

    - step_name: render_report
      input:
        - report_insights
      output:
        - weekly_report.docx

  layer_boundaries:
    data_analytics:
      - ingest_standardize
      - build_weekly_metrics
      - build_weekly_changes
      - detect_anomalies
    agent:
      - generate_insights
    reporting:
      - render_report

  hard_constraints:
    - report_render.py must not read weekly_metrics or weekly_changes for inference or backfill.
    - report_render.py must consume report_insights as the only content input.
