      allow_excel_serial: true
      on_failure: invalid_date
    asset_key_rule:
      type: prefer_columns
      columns: [ticker, Code, Name]
      fallback: sheet_name

  - sheet: 大宗商品-石油价格
    status: ready
    asset_class: commodity
    time_field: Date
    asset_field: S5111905
    value_fields: [EDBclose]
    unit_rules:
      default_unit: raw
