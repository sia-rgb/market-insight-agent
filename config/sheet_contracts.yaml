  - sheet: 衍生品-50ETF期权
    status: ready
    asset_class: derivative
    time_field: date
    asset_field: [mark_code, mark_name]
    value_fields: [daily_volume, daily_call_volume, daily_put_volume, daily_position, daily_call_position, daily_put_position, daily_contract_rate]
    unit_rules:
      default_unit: raw
      metric_units:
        daily_contract_rate: "%"
      allowed_units: [raw, "%"]
    date_parse_rule:
      source_fields_priority: [date, Date]
      formats: ["%Y-%m-%d", "%Y/%m/%d", "%Y%m%d"]
      allow_excel_serial: true
      on_failure: invalid_date
    asset_key_rule:
      type: concat_columns
      columns: [mark_code, mark_name]
      delimiter: "|"
