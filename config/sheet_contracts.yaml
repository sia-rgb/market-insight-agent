    date_parse_rule:
      source_fields_priority: [Date, date]
      formats: ["%Y-%m-%d", "%Y/%m/%d", "%Y%m%d"]
      allow_excel_serial: true
      on_failure: invalid_date
    asset_key_rule:
      type: fixed
      value: 同业拆借利率

  - sheet: 外汇-美元指数&人民币汇率
    status: ready
    asset_class: fx
    time_field: Date
    asset_field: [USDX.FX, USDCNY.EX]
    value_fields: [close]
