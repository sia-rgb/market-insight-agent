version: 2

date_parse_defaults:
  source_fields_priority: [date, Date, end_date, 截止日期, 截止日]
  formats: ["%Y-%m-%d", "%Y/%m/%d", "%Y%m%d", "%m/%d/%Y", "%Y-%m-%d %H:%M:%S"]
  allow_excel_serial: true
  on_failure: invalid_date

sheet_contracts:
  - sheet: 权益-全球股指
    status: ready
    asset_class: equity
    time_field: 截止日期
    asset_field: [Code, Name]
    value_fields: [最近一周, 最新收盘价, 最近1月, 2026年至今, 2025年全年]
    unit_rules:
      default_unit: raw
      metric_units:
        最近一周: "%"
        最近1月: "%"
        2026年至今: "%"
        2025年全年: "%"
      allowed_units: ["%", raw]
    date_parse_rule:
      source_fields_priority: [截止日期, Date, date]
      formats: ["%Y-%m-%d", "%Y/%m/%d", "%Y%m%d"]
      allow_excel_serial: true
      on_failure: invalid_date
    asset_key_rule:
      type: prefer_columns
      columns: [Code, Name]
      fallback: sheet_name

  - sheet: 权益-A股交易量
    status: ready
    asset_class: equity
    time_field: Date
    asset_field: A股市场
    value_fields: [A股总成交额（亿元）]
    unit_rules:
      default_unit: 亿元
      metric_units: {}
      allowed_units: [亿元]
    date_parse_rule:
      source_fields_priority: [Date, date]
      formats: ["%Y-%m-%d", "%Y/%m/%d", "%Y%m%d"]
      allow_excel_serial: true
      on_failure: invalid_date
    asset_key_rule:
      type: fixed
      value: A股市场

  - sheet: 权益-南北向
    status: ready
    asset_class: equity
    time_field: date
    asset_field: 南向
    value_fields: [南向-成交净买入(亿元,港元)]
    unit_rules:
      default_unit: 亿元
      metric_units: {}
      allowed_units: [亿元, 港元]
    date_parse_rule:
      source_fields_priority: [date, Date]
      formats: ["%Y-%m-%d", "%Y/%m/%d", "%Y%m%d"]
      allow_excel_serial: true
      on_failure: invalid_date
    asset_key_rule:
      type: fixed
      value: 南向

  - sheet: 权益-两融余额
    status: ready
    asset_class: equity
    time_field: end_date
    asset_field: A股两融
    value_fields: [融资余额, 融券余额, 融资融券余额(沪深两市), 两融余额占A股流通市值(%)]
    unit_rules:
      default_unit: raw
      metric_units:
        两融余额占A股流通市值(%): "%"
      allowed_units: [亿元, "%", raw]
    date_parse_rule:
      source_fields_priority: [end_date, 截止日, date]
      formats: ["%Y-%m-%d", "%Y/%m/%d", "%Y%m%d"]
      allow_excel_serial: true
      on_failure: invalid_date
    asset_key_rule:
      type: fixed
      value: A股两融

  - sheet: 权益-VIX
    status: ready
    asset_class: equity
    time_field: Date
    asset_field: VIX.GI
    value_fields: [close]
    unit_rules:
      default_unit: raw
      metric_units: {}
      allowed_units: [raw]
    date_parse_rule:
      source_fields_priority: [Date, date]
      formats: ["%Y-%m-%d", "%Y/%m/%d", "%Y%m%d"]
      allow_excel_serial: true
      on_failure: invalid_date
    asset_key_rule:
      type: fixed
      value: VIX.GI

  - sheet: 权益-散户情绪资金流向
    status: ready
    asset_class: equity
    time_field: date
    asset_field: 沪深300
