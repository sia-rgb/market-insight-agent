version: 2

project_scope:
  mode: daily_market_dashboard
  in_scope:
    - read_and_standardize_market_xlsx
    - calculate_daily_metric_changes
    - generate_dashboard_data_json
    - render_static_market_dashboard
  out_of_scope:
    - intraday_monitoring
    - forecasting_model
    - strategy_backtest
    - causal_inference_automation
    - trading_execution
    - unconfirmed_cross_source_join_or_conversion
    - default_agent_judgment
  data_frequency: daily
  asset_classes:
    - equity
    - fixed_income
    - fx
    - commodity
    - derivative

dashboard_metric_policy:
  grain:
    - source_sheet
    - asset_name
    - metric_name
  unit_source: config/sheet_contracts.yaml
  fact_integrity:
    dashboard_layer_may_format: true
    dashboard_layer_must_not_rewrite_data_facts: true
    unknown_unit_must_not_be_guessed: true

standardized_market_data:
  required_columns:
    - date
    - week_start
    - week_end
    - asset_class
    - asset_name
    - asset_key
    - series_key
    - metric_name
    - value
    - unit
    - source_file
    - source_sheet
    - is_valid
    - validation_code
    - validation_note
  optional_columns:
    - ticker
    - source_asset_name
    - source_metric_name
    - value_raw
    - unit_raw

dashboard_data_contract:
  input: standardized_market_data
  output: frontend/data/dashboard_data.json
  required_payload_keys:
    - generated_at
    - latest_date
    - dates
    - summary
    - sheets
    - latest_records
    - rankings
    - series
  calculated_fields:
    - previous_value
    - daily_abs_change
    - daily_pct_change
    - direction
  display_fields:
    - date
    - source_sheet
    - asset_class
    - asset_name
    - metric_name
    - value
    - unit
    - daily_abs_change
    - daily_pct_change
  forbidden:
    - add_external_search
    - add_driver_inference
    - rewrite_metric_values
    - guess_unknown_units

ingest_runtime_assumptions:
  header_scan_max_rows: 30
  block_split: repeated_time_field_column
  data_start_offset_rows: 2
  ticker_detection: high_non_numeric_ratio
  source_file: actual_input_filename

legacy_agent_status:
  status: disabled_by_default
  retained_modules:
    - src/agent_context.py
    - src/agent_llm.py
    - src/agent_prompt.py
    - src/agent_evidence.py
    - src/agent_tools.py
    - src/agent_insight_generate.py
    - src/report_render.py
  allowed_only_when_explicitly_called:
    - run_weekly_metrics
    - run_weekly_changes
    - run_anomaly_detect
    - run_insight_generate
    - run_render_report

stage_two_agent_status:
  status: explicit_demo_command
  command: run_agent_insights
  input: frontend/data/dashboard_data.json
  output: frontend/data/agent_insights.json
  search_provider: Serper
  default_pipeline: not_in_run_all
