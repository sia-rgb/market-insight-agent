<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>2026 年宏观市场核心指标看板</title>
  <link rel="stylesheet" href="styles.css">
  <script src="vendor/html2canvas.min.js"></script>
  <script src="app.js" defer></script>
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="brand-block">
        <h1>2026 年宏观市场核心指标看板</h1>
        <p class="dashboard-subtitle">全市场 权益/固收/衍生品/外汇/商品等资产 每日监测（数据来源：wind）</p>
      </div>
      <div class="status-panel" aria-live="polite">
        <div class="status-row status-row-button">
          <button id="exportLongImage" class="export-long-image" type="button">导出为长图</button>
        </div>
      </div>
    </header>

    <main>
      <section class="toolbar" aria-label="筛选器">
        <label class="field">
          <span>日期</span>
          <select id="dateSelect"></select>
        </label>
        <div id="classFilters" class="segmented" role="group" aria-label="资产类别"></div>
      </section>

      <section id="agentInsightPanel" class="panel agent-panel" hidden>
        <div class="panel-head">
          <div>
            <p class="eyebrow">Agent Judgment</p>
            <h2>异动解释 / 外部线索</h2>
            <p id="agentInsightMeta" class="section-note"></p>
          </div>
        </div>
        <div id="agentInsightList" class="agent-insight-list"></div>
      </section>

      <section class="global-grid">
        <div class="global-stack">
          <div class="panel">
            <div class="panel-head">
              <div>
                <p class="eyebrow">Global Indices</p>
                <h2>全球主要股指一览</h2>
                <p class="section-note">按周涨幅排序</p>
              </div>
            </div>
            <div id="globalIndexList" class="index-list"></div>
          </div>

          <div class="panel vix-panel">
            <div class="panel-head">
              <div>
                <p class="eyebrow">Volatility</p>
                <h2>市场波动率指数</h2>
                <p class="section-note">VIX指数</p>
              </div>
            </div>
            <canvas id="vixCanvas" width="520" height="210" aria-label="VIX指数走势图"></canvas>
          </div>
        </div>

        <div class="right-stack">
          <div class="panel panel-large">
            <div class="panel-head">
              <div>
                <p class="eyebrow">Trend</p>
                <h2>全球股指表现</h2>
                <p class="chart-note">基准为 100</p>
              </div>
            </div>
            <canvas id="globalIndexCanvas" width="920" height="360" aria-label="全球股指基准表现图"></canvas>
          </div>

          <div class="panel treasury-panel">
            <div class="panel-head">
              <div>
                <p class="eyebrow">Rates</p>
                <h2>美国 10 年期国债收益率 (%)</h2>
              </div>
            </div>
            <canvas id="treasuryCanvas" width="920" height="220" aria-label="美国10年期国债收益率走势图"></canvas>
          </div>
        </div>
      </section>

      <section class="panel">
        <div class="panel-head">
          <div>
            <p class="eyebrow">Moves</p>
            <h2>日度涨跌幅榜</h2>
          </div>
        </div>
        <div id="moverList" class="mover-list"></div>
      </section>

      <section class="panel table-panel">
        <div class="panel-head">
          <div>
            <p class="eyebrow">Details</p>
            <h2>核心指标变动</h2>
          </div>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>工作表</th>
                <th>资产</th>
                <th>指标</th>
                <th class="numeric">最新值</th>
                <th class="numeric">日变动</th>
                <th class="numeric">日变动率</th>
              </tr>
            </thead>
            <tbody id="detailRows"></tbody>
          </table>
        </div>
      </section>
    </main>
  </div>
</body>
</html>
